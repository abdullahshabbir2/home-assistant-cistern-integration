  - title: Settings
    path: settings
    icon: mdi:cog
    badges: []
    cards:
      - type: markdown
        content: |
          ## Settings
          _Here you can configure your myCistern WaterGuard device_
      - square: true
        type: grid
        cards:
          - type: entities
            title: Outlet Configuration
            entities:
              - entity: number.outlet_1_configuration
              - entity: number.outlet_2_configuration
              - entity: number.outlet_3_configuration
              - entity: number.outlet_4_configuration
              - entity: number.outlet_5_configuration
              - entity: number.outlet_6_configuration
              - entity: number.outlet_7_configuration
              - entity: number.outlet_8_configuration
          - type: entities
            title: System Settings
            entities:
              - entity: number.collection_surface_sqm
              - entity: switch.filter_sensor
              - entity: switch.flow_sensor
              - entity: switch.time_ctrl_outlets
              - entity: switch.flow_manual
              - entity: switch.level_sensor
              - entity: number.lower_level_controller_threshold
              - entity: switch.manual_tank_def
              - entity: number.flow_sensor_max_volume
              - entity: number.max_manual_irrigation_duration_min
              - entity: number.max_refill_duration_min
              - entity: number.number_of_tanks
              - entity: number.irrigation_optimization_level
              - entity: switch.split_irrigation
              - entity: time.irrigation_start_time_1
              - entity: time.irrigation_start_time_2
              - entity: number.tank_measure_a_m
              - entity: number.tank_measure_b_m
              - entity: number.tank_measure_c_m
              - entity: number.tank_pre_defined_model
              - entity: switch.time_ctrl_outlets
              - entity: number.upper_level_controller_threshold
              - entity: number.warning_threshold
            show_header_toggle: false
          - type: entities
            title: System Info
            entities:
              - entity: sensor.device_name
                name: Device Name
              - entity: sensor.ip_address
                name: Device IP
              - entity: sensor.mac_address
                name: Device MAC
              - entity: sensor.ssid
                name: Connected Network
              - entity: sensor.error
                name: Last Update
              - entity: sensor.serial_number
                name: Serial Number
        columns: 1
