views:
  - title: Overview
    path: overview
    icon: mdi:home
    badges:
      - type: entity
        entity: weather.forecast_home
    cards:
      - type: markdown
        content: >
          ## Overview

          _This section is intended to give you an overview over your cistern’s
          current parameters_
      - square: true
        type: grid
        cards:
          - type: vertical-stack
            cards:
              - type: gauge
                entity: sensor.fill_level
                name: Cistern Fill Level (%)
                min: 0
                max: 100
                severity:
                  green: 50
                  yellow: 30
                  red: 10
              - type: glance
                title: Level Info
                entities:
                  - entity: sensor.fill_height_m
                  - entity: sensor.fill_level_l
              - type: button
                entity: sensor.filter_status
                name: Filter Status
                icon: mdi:air-filter
                show_state: true
                tap_action: none
          - type: vertical-stack
            cards:
              - show_current: true
                show_forecast: true
                type: weather-forecast
                entity: weather.forecast_home
                name: Weather Info
                forecast_type: daily
              - type: entities
                title: Precipitation Data
                entities:
                  - entity: sensor.expected_inflow_l
                  - entity: sensor.expected_inflow_l
                  - entity: sensor.historic_precip_l_m2
        columns: 1
      - type: grid
        columns: 2
        cards:
          - type: vertical-stack
            cards:
              - type: button
                entity: sensor.extraction_pumps_active
                name: Extraction Pumps Active
                icon: mdi:water-pump
                show_state: true
                tap_action: none
              - type: button
                entity: sensor.refill_appliances_active
                name: Refill Appliances Active
                icon: mdi:waves-arrow-right
                show_state: true
                tap_action: none
          - type: vertical-stack
            cards:
              - type: button
                entity: sensor.drainage_appliances_active
                name: Drainage Appliances Active
                icon: mdi:waves-arrow-left
                show_state: true
                tap_action: none
              - type: button
                entity: sensor.filter_check_appliances_active
                name: Filter Check Appliances Active
                icon: mdi:air-filter
                show_state: true
                tap_action: none
          - type: vertical-stack
            cards:
              - type: button
                entity: sensor.irrigation_valves_active
                name: Irrigation Valves Active
                icon: mdi:valve
                show_state: true
                tap_action: none
              - type: button
                entity: sensor.time_ctrl_outlets_active
                name: Time-Controlled Outlets Active
                icon: mdi:clock-outline
                show_state: true
                tap_action: none
      - type: entities
        title: System State
        entities:
          - entity: sensor.error
            name: System Status
          - entity: sensor.operating_mode
            name: Operating Mode
      - type: horizontal-stack
        cards:
          - type: entities
            title: Relay Controls
            show_header_toggle: false
            entities:
              - entity: switch.relay_1
                name: Relay 1
              - entity: switch.relay_2
                name: Relay 2
              - entity: switch.relay_3
                name: Relay 3
              - entity: switch.relay_4
                name: Relay 4
              - entity: switch.relay_5
                name: Relay 5
              - entity: switch.relay_6
                name: Relay 6
              - entity: switch.relay_7
                name: Relay 7
              - entity: switch.relay_8
                name: Relay 8
