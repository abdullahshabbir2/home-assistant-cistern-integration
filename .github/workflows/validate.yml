name: Validate

on:
  push:
  pull_request:

jobs:
  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile custom component
        run: python -m compileall custom_components

